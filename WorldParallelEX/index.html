<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - Mean Human Vis</title>

    <script src="https://cdn.plot.ly/plotly-3.3.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"></script>

     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
      :root {
        --panel: #cfcfcf;   /* background gray */
        --border: #cfcfcf;  /* border of the three boxes are black */
      }

      html, body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        font-family: sans-serif;
      }

      .logo {
        height: 40px;
        object-fit: contain;
      }

      .page {
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
        background: var(--bg);
      }

      .topbar {
        width: 100%;
        display: flex;
        padding: 4px 8px;
        justify-content: flex-start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        min-height: 0;
      }
       /* enlarge the parallel cooridnate plot button */
      .expand-btn {
        position: absolute;
        top: 0.1px;
        right: 3px;
        z-index: 20;
        width: 19px;
        height: 19px;
        border: 1px solid #999;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .expand-btn:hover {
        background: #fff;
      }
      /* show the box on the parallel coordinate plot */
      .par-panel {
        position: relative;
      }
       /* the panel when expanded */
      .par-panel.expanded {
        position: fixed;
        left: 8px;
        right: 8px;
        bottom: 8px;
        top: calc(62vh); /* The part of the page is should fill */
        z-index: 9999;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        border-radius: 8px;
      }

      .par-panel.expanded #parDiv {
        height: 100%;
      }

      /* The map takes around 50 % height */
      .mapRow {
        flex: 1.4 1 0;
        min-height: 400px;
        display: flex;
        gap: 8px;
      }

      #mapPanel {
        flex: 1 1 0;
        min-width: 0;
      }

      .sidebar {
        width: 260px;
        flex-shrink: 0;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 20px;

        /* Scroll function*/
        overflow-y: auto;
        max-height: 100%;
      }

      .sidebar .nav-buttons {
        display: flex;
        flex-direction: row;
        justify-content: space-evenly;
        align-items: center;
      }

      .sidebar .nav-btn {
        width: 36px;
        height: 36px;

        display: flex;
        align-items: center;
        justify-content: center;

        border: none;
        border-radius: 8px;
        background: transparent;

        cursor: pointer;
      }

      .sidebar .nav-btn:hover .material-symbols-outlined {
        color: #9e9e9e;
      }

      .sidebar .nav-btn.active .material-symbols-outlined {
        color: #1753d4;
}

      .sidebar .dropdowns {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .sidebar label {
        font-size: 0.95rem;
        font-weight: 550;
      }

      .sidebar select {
        width: 100%;
        padding: 8px 10px;
        font-size: 0.9rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
      }

      .sidebar .sidebar-guide {
        font-size: 0.8rem;
        line-height: 1.4;
        color: #444;
      }

      .sidebar .sidebar-guide h3 {
        margin: 0 0 6px 0;
        font-size: 0.95rem;
        margin-top: 1.0em;
      }

      .sidebar .sidebar-guide ul {
        margin: 0 0 8px 0;
        padding-left: 1em;
      }

      .sidebar .sidebar-guide li {
        margin-bottom: 6px;
      }

      .sidebar .sidebar-guide p {
        margin: 0 0 1px 0;
      }

      .sidebar .sidebar-guide p:last-child {
        margin-bottom: 0;
      }

      .reset-btn {
       width: 100%;
       padding: 10px 12px;
        font-size: 0.95rem;
        font-weight: 600;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }

      .reset-btn:hover {
        background: #f3f3f3;
      }

      /* Bottom row takes the other height */
      .bottomRow {
        flex: 1 1 0;
        display: flex;
        gap: 8px;
        min-height: 240px;
      }

      .bottomRow .panel {
        flex: 1 1 0;
        min-width: 0;
        min-height: 0;
      }

      #mapDiv, #scatterDiv, #bubbleDiv, #parDiv {
        width: 100%;
        height: 100%;
      }

      @media (max-width: 900px) {
        .mapRow {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
        }
        .bottomRow {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="topbar">
        <img src="logo1.png" alt="Mean Human Vis" class="logo">
      </div>
      <div class="mapRow">
        <div id="mapPanel" class="panel">
          <div id="mapDiv"></div>
        </div>
        <aside class="sidebar">
          <div class="nav-buttons">
            <button type="button" onclick="window.location.href='index.html'" class="nav-btn" id="navDashboard">
              <span class="material-symbols-outlined">home</span>
            </button>
            <button type="button" onclick="window.location.href='how_to_use.html'" class="nav-btn" id="navHowTo">
              <span class="material-symbols-outlined">help</span>
            </button>
            <button type="button" onclick="window.location.href='about.html'" class="nav-btn" id="navAbout">
              <span class="material-symbols-outlined">page_info</span>
            </button>
          </div>
          <div class="dropdowns">
            <label for="mapMetric">Map attribute</label>
            <select id="mapMetric">
              <option value="Mean male height (cm)">Mean male height (cm)</option>
              <option value="Mean female height (cm)">Mean female height (cm)</option>
              <option value="Mean male BMI (kg/m_2)">Mean male BMI (kg/m²)</option>
              <option value="Mean female BMI (kg/m_2)">Mean female BMI (kg/m²)</option>
              <option value="Life expectancy at birth (years)">Life expectancy at birth (years)</option>
              <option value="Road traffic mortality rate (per 100 000 population)">Road traffic mortality rate (per 100 000 population)</option>
              <option value="Mortality rate due to homicide (per 100 000 population)">Mortality rate due to homicide (per 100 000 population)</option>
              <option value="Total alcohol per capita (more 15 years of age) consumption (litres of pure alcohol)">Total alcohol per capita (more 15 years of age) consumption (litres of pure alcohol)</option>
              <option value="Density of medical doctors (per 10 000 population)">Density of medical doctors (per 10 000 population)</option>
              <option value="Age-standardized prevalence of tobacco use among persons 15 years and older  (%)">Age-standardized prevalence of tobacco use among persons 15 years and older  (%)</option>
              <option value="Happiness - Life evaluation (3-year average)">Happiness - Life evaluation (3-year average)</option>
              <option value="Cost of Living Index">Cost of Living Index</option>
              <option value="Price To Income Ratio">Price To Income Ratio</option>
            </select>
          </div>
          <div class="dropdowns">
            <label for="scatterMetric">Scatter attribute</label>
            <select id="scatterMetric">
              <option value="Mean male height (cm)">Mean male height (cm)</option>
              <option value="Mean female height (cm)">Mean female height (cm)</option>
              <option value="Mean male BMI (kg/m_2)">Mean male BMI (kg/m²)</option>
              <option value="Mean female BMI (kg/m_2)">Mean female BMI (kg/m²)</option>
              <option value="Life expectancy at birth (years)">Life expectancy at birth (years)</option>
              <option value="Road traffic mortality rate (per 100 000 population)">Road traffic mortality rate (per 100 000 population)</option>
              <option value="Mortality rate due to homicide (per 100 000 population)">Mortality rate due to homicide (per 100 000 population)</option>
              <option value="Total alcohol per capita (more 15 years of age) consumption (litres of pure alcohol)">Total alcohol per capita (more 15 years of age) consumption (litres of pure alcohol)</option>
              <option value="Density of medical doctors (per 10 000 population)">Density of medical doctors (per 10 000 population)</option>
              <option value="Age-standardized prevalence of tobacco use among persons 15 years and older  (%)">Age-standardized prevalence of tobacco use among persons 15 years and older  (%)</option>
              <option value="Happiness - Life evaluation (3-year average)">Happiness - Life evaluation (3-year average)</option>
              <option value="Cost of Living Index">Cost of Living Index</option>
              <option value="Price To Income Ratio">Price To Income Ratio</option>
            </select>
          </div>
          <div class="dropdowns">
            <label for="bubbleMetric">Bubble attribute</label>
            <select id="bubbleMetric">
              <option value="Mean male height (cm)">Mean male height (cm)</option>
              <option value="Mean female height (cm)">Mean female height (cm)</option>
              <option value="Mean male BMI (kg/m_2)">Mean male BMI (kg/m²)</option>
              <option value="Mean female BMI (kg/m_2)">Mean female BMI (kg/m²)</option>
              <option value="Life expectancy at birth (years)">Life expectancy at birth (years)</option>
              <option value="Road traffic mortality rate (per 100 000 population)">Road traffic mortality rate (per 100 000 population)</option>
              <option value="Mortality rate due to homicide (per 100 000 population)">Mortality rate due to homicide (per 100 000 population)</option>
              <option value="Total alcohol per capita (more 15 years of age) consumption (litres of pure alcohol)">Total alcohol per capita (more 15 years of age) consumption (litres of pure alcohol)</option>
              <option value="Density of medical doctors (per 10 000 population)">Density of medical doctors (per 10 000 population)</option>
              <option value="Age-standardized prevalence of tobacco use among persons 15 years and older  (%)">Age-standardized prevalence of tobacco use among persons 15 years and older  (%)</option>
              <option value="Happiness - Life evaluation (3-year average)">Happiness - Life evaluation (3-year average)</option>
              <option value="Cost of Living Index">Cost of Living Index</option>
              <option value="Price To Income Ratio">Price To Income Ratio</option>
            </select>
          </div>
          <div class="dropdowns">
            <button id="resetAllBtn" class="reset-btn" type="button">Reset all</button>
          </div>
        </aside>
      </div>

    <div class="bottomRow">
      <div class="panel">
        <div id="scatterDiv"></div>
      </div>
      <div class="panel">
        <div id="bubbleDiv"></div>
      </div>
      <div id="parPanel" class="panel par-panel">
        <button id="parExpandBtn" class="expand-btn" type="button" title="Enlarge parallel coordinates">
          ⛶
        </button>
        <div id="parDiv"></div>
      </div>
    </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
